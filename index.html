<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anfisa Language Adventure</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#6a85ff,#b06cff);
margin:0;
padding:0;
text-align:center;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.cat{
font-size:90px;
}

h1{
margin-top:10px;
}

.langs button{
margin:5px;
padding:10px 15px;
border:none;
border-radius:8px;
background:white;
color:#333;
cursor:pointer;
font-weight:bold;
}

.game{
background:white;
color:#333;
padding:30px;
border-radius:20px;
margin-top:20px;
}

.answers button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:10px;
background:#6a85ff;
color:white;
font-size:16px;
cursor:pointer;
}

.answers button:hover{
background:#4d66ff;
}

.score{
font-size:18px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="cat">🐱</div>
<h1>Anfisa Language Adventure</h1>

<div class="langs">

<button onclick="setLang('en')">English</button>
<button onclick="setLang('ru')">Русский</button>
<button onclick="setLang('de')">Deutsch</button>
<button onclick="setLang('fr')">Français</button>
<button onclick="setLang('es')">Español</button>
<button onclick="setLang('it')">Italiano</button>
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('ja')">日本語</button>
<button onclick="setLang('ko')">한국어</button>
<button onclick="setLang('ar')">العربية</button>

</div>

<div class="game">

<div id="question"></div>

<div class="answers" id="answers"></div>

<div class="score" id="score">Score: 0</div>

</div>

</div>

<script>

let score = 0
let current = 0
let lang = "en"

const data = {

en:[
{q:"What animal is Anfisa?",a:["Cat","Dog","Bird"],c:0},
{q:"What color is the sky?",a:["Blue","Green","Red"],c:0},
{q:"How many legs does a cat have?",a:["4","2","6"],c:0}
],

ru:[
{q:"Кто Анфиса?",a:["Кошка","Собака","Птица"],c:0},
{q:"Какого цвета небо?",a:["Синее","Зелёное","Красное"],c:0},
{q:"Сколько лап у кошки?",a:["4","2","6"],c:0}
],

de:[
{q:"Was ist Anfisa?",a:["Katze","Hund","Vogel"],c:0},
{q:"Welche Farbe hat der Himmel?",a:["Blau","Grün","Rot"],c:0},
{q:"Wie viele Beine hat eine Katze?",a:["4","2","6"],c:0}
],

fr:[
{q:"Qu'est-ce qu’Anfisa?",a:["Chat","Chien","Oiseau"],c:0},
{q:"Quelle est la couleur du ciel?",a:["Bleu","Vert","Rouge"],c:0},
{q:"Combien de pattes a un chat?",a:["4","2","6"],c:0}
],

es:[
{q:"¿Qué es Anfisa?",a:["Gato","Perro","Pájaro"],c:0},
{q:"¿De qué color es el cielo?",a:["Azul","Verde","Rojo"],c:0},
{q:"¿Cuántas patas tiene un gato?",a:["4","2","6"],c:0}
],

it:[
{q:"Chi è Anfisa?",a:["Gatto","Cane","Uccello"],c:0},
{q:"Di che colore è il cielo?",a:["Blu","Verde","Rosso"],c:0},
{q:"Quante zampe ha un gatto?",a:["4","2","6"],c:0}
],

zh:[
{q:"安菲萨是什么动物?",a:["猫","狗","鸟"],c:0},
{q:"天空是什么颜色?",a:["蓝色","绿色","红色"],c:0},
{q:"猫有几条腿?",a:["4","2","6"],c:0}
],

ja:[
{q:"アンフィサは何ですか？",a:["猫","犬","鳥"],c:0},
{q:"空の色は？",a:["青","緑","赤"],c:0},
{q:"猫の足はいくつ？",a:["4","2","6"],c:0}
],

ko:[
{q:"안피사는 무엇입니까?",a:["고양이","개","새"],c:0},
{q:"하늘의 색은?",a:["파랑","초록","빨강"],c:0},
{q:"고양이 다리는 몇 개?",a:["4","2","6"],c:0}
],

ar:[
{q:"ما هي أنفيسا؟",a:["قطة","كلب","طائر"],c:0},
{q:"ما لون السماء؟",a:["أزرق","أخضر","أحمر"],c:0},
{q:"كم عدد أرجل القطة؟",a:["4","2","6"],c:0}
]

}

function setLang(l){

lang=l
score=0
current=0

document.getElementById("score").innerText="Score: "+score

load()

}

function load(){

let q=data[lang][current]

document.getElementById("question").innerText=q.q

let answers=document.getElementById("answers")

answers.innerHTML=""

q.a.forEach((text,i)=>{

let btn=document.createElement("button")

btn.innerText=text

btn.onclick=function(){

if(i==q.c){

score++
alert("✔ Correct!")

}else{

alert("✖ Try again")

}

document.getElementById("score").innerText="Score: "+score

current++

if(current>=data[lang].length){

alert("Game finished! Score: "+score)

current=0
score=0

}

load()

}

answers.appendChild(btn)

})

}

setLang("en")

</script>

</body>
</html>
